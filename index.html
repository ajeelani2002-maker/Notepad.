<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Notepad</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #333;
      padding: 10px;
      text-align: center;
      font-size: 18px;
    }

    textarea {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      padding: 15px;
      font-size: 16px;
      background: #121212;
      color: white;
    }

    .buttons {
      display: flex;
      justify-content: space-around;
      padding: 10px;
      background: #222;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }

    .clear {
      background: #e74c3c;
    }

    .download {
      background: #3498db;
    }
  </style>
</head>
<body>

  <header>📝 My Notepad</header>

  <textarea id="note" placeholder="Start typing..."></textarea>

  <div class="buttons">
    <button onclick="saveNote()">Save</button>
    <button class="clear" onclick="clearNote()">Clear</button>
    <button class="download" onclick="downloadNote()">Download</button>
  </div>

  <script>
    const note = document.getElementById("note");

    // Load saved note
    window.onload = function() {
      note.value = localStorage.getItem("myNote") || "";
    };

    function saveNote() {
      localStorage.setItem("myNote", note.value);
      alert("Saved!");
    }

    function clearNote() {
      if(confirm("Are you sure you want to clear?")) {
        note.value = "";
        localStorage.removeItem("myNote");
      }
    }

    function downloadNote() {
      const text = note.value;
      const blob = new Blob([text], { type: "text/plain" });
      const link = document.createElement("a");

      link.href = URL.createObjectURL(blob);
      link.download = "my_note.txt";
      link.click();
    }
  </script>

</body>
  </html>
