<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Notepad</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    header {
        background: #1e293b;
        padding: 12px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
    }

    textarea {
        flex: 1;
        width: 100%;
        border: none;
        outline: none;
        padding: 15px;
        font-size: 16px;
        resize: none;
        background: #020617;
        color: white;
    }

    .toolbar {
        display: flex;
        justify-content: space-around;
        padding: 10px;
        background: #1e293b;
    }

    button {
        flex: 1;
        margin: 5px;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        cursor: pointer;
    }

    .save { background: #22c55e; color: black; }
    .clear { background: #ef4444; color: white; }
    .download { background: #3b82f6; color: white; }
    .theme { background: #facc15; color: black; }

</style>
</head>

<body>

<header>📝 Smart Notepad</header>

<textarea id="note" placeholder="Start typing..."></textarea>

<div class="toolbar">
    <button class="save" onclick="saveNote()">Save</button>
    <button class="clear" onclick="clearNote()">Clear</button>
    <button class="download" onclick="downloadNote()">Download</button>
    <button class="theme" onclick="toggleTheme()">Theme</button>
</div>

<script>
const note = document.getElementById("note");

// Auto-load
window.onload = () => {
    note.value = localStorage.getItem("smartNote") || "";
};

// Auto-save while typing
note.addEventListener("input", () => {
    localStorage.setItem("smartNote", note.value);
});

function saveNote() {
    localStorage.setItem("smartNote", note.value);
    alert("Saved!");
}

function clearNote() {
    if (confirm("Clear all text?")) {
        note.value = "";
        localStorage.removeItem("smartNote");
    }
}

function downloadNote() {
    const blob = new Blob([note.value], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "note.txt";
    a.click();
}

// Theme toggle
let dark = true;
function toggleTheme() {
    if (dark) {
        document.body.style.background = "#f1f5f9";
        document.body.style.color = "#000";
        note.style.background = "#fff";
        note.style.color = "#000";
    } else {
        document.body.style.background = "#0f172a";
        document.body.style.color = "#fff";
        note.style.background = "#020617";
        note.style.color = "#fff";
    }
    dark = !dark;
}
</script>

</body>
  </html>
